name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine-tests:
    name: Engine (Python) tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -v

  frontend-build:
    name: Frontend (TypeScript) build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build @pagecap/core
        run: npm run build --workspace=packages/core

      - name: Build @pagecap/ui
        run: npm run build --workspace=packages/ui

      - name: Build @pagecap/electron
        run: npm run build --workspace=packages/electron

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build engine image
        run: docker build -t pagecap-engine:ci -f engine/Dockerfile .
